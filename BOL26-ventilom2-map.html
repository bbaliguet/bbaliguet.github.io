<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BOL D'OR 2026 — VENTILO M2 Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
       background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column;
       overflow: hidden; }
#map { flex: 1; min-height: 0; }
#controls { background: #16213e; border-top: 2px solid #0f3460; padding: 8px 16px 10px; flex-shrink: 0; }
#row1 { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
#row2 { display: flex; align-items: center; gap: 8px; }
#play-btn { background: #e94560; color: white; border: none; border-radius: 50%;
            width: 38px; height: 38px; font-size: 18px; cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; }
#play-btn:hover { background: #c73652; }
.step-btn { background: #0f3460; color: #ccc; border: none; border-radius: 4px;
            width: 30px; height: 30px; cursor: pointer; font-size: 16px; flex-shrink: 0; }
.step-btn:hover { background: #1a4a8a; }
#slider { flex: 1; accent-color: #e94560; cursor: pointer; height: 6px; }
#time-display { font-size: 16px; font-weight: 700; min-width: 130px; color: #fff; }
#elapsed-display { font-size: 13px; color: #7ecfff; min-width: 70px; }
#night-badge { background: #0a1628; color: #7ecfff; border: 1px solid #1e4080;
               border-radius: 12px; padding: 2px 10px; font-size: 12px; display: none; }
.speed-label { font-size: 12px; color: #888; }
.speed-btn { background: #0f3460; color: #aaa; border: none; border-radius: 4px;
             padding: 3px 10px; cursor: pointer; font-size: 12px; }
.speed-btn.active { background: #e94560; color: white; }
.speed-btn:hover:not(.active) { background: #1a4a8a; }
#legend { display: flex; align-items: center; gap: 14px; margin-left: auto; flex-shrink: 0; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #aaa; }
.dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.leaflet-tooltip { background: rgba(20,30,50,0.92); border: 1px solid #345; color: #eee;
                   font-size: 12px; border-radius: 4px; padding: 4px 8px; }
.boat-icon { background: transparent !important; border: none !important; }

/* ── Boat panel ── */
#toggle-panel-btn {
  position: fixed; top: 10px; right: 10px; z-index: 1001;
  background: rgba(22,33,62,0.92); border: 1px solid #0f3460; border-radius: 6px;
  color: #7ecfff; padding: 7px 13px; cursor: pointer; font-size: 13px; font-weight: 600;
}
#toggle-panel-btn:hover { background: rgba(15,52,96,0.95); }
#boat-panel {
  position: fixed; top: 10px; right: 10px; z-index: 1000;
  width: 270px; max-height: calc(100vh - 110px);
  background: rgba(18,28,52,0.97); border: 1px solid #1a3a6a; border-radius: 8px;
  display: flex; flex-direction: column;
  box-shadow: 0 6px 24px rgba(0,0,0,0.6);
  transform: translateX(290px); transition: transform 0.22s ease;
}
#boat-panel.open { transform: translateX(0); }
#panel-header {
  display: flex; align-items: center; gap: 6px;
  padding: 9px 10px 7px; border-bottom: 1px solid #1a3a6a; flex-shrink: 0;
}
#panel-title { flex: 1; font-size: 13px; font-weight: 600; color: #7ecfff; }
#clear-sel-btn {
  background: none; border: none; color: #668; cursor: pointer; font-size: 11px;
  padding: 2px 6px; border-radius: 3px;
}
#clear-sel-btn:hover { color: #e94560; background: rgba(233,69,96,0.12); }
#close-panel-btn {
  background: none; border: none; color: #668; cursor: pointer; font-size: 16px; line-height: 1;
}
#close-panel-btn:hover { color: #eee; }
#boat-search {
  margin: 7px 8px; padding: 5px 8px; font-size: 12px;
  background: #0d2040; border: 1px solid #1a3a6a; border-radius: 4px;
  color: #ddd; outline: none; width: calc(100% - 16px); flex-shrink: 0;
}
#boat-search::placeholder { color: #446; }
#boat-search:focus { border-color: #4A9FDD; }
#boat-list { overflow-y: auto; flex: 1; padding-bottom: 6px; }
.boat-row {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px; cursor: pointer; font-size: 12px; color: #bbb;
  border-left: 3px solid transparent;
}
.boat-row:hover { background: rgba(15,52,96,0.5); }
.boat-row.sel { background: rgba(26,58,106,0.6); color: #fff; border-left-color: #4A9FDD; }
.boat-row.sel.uaua-row { border-left-color: #FF4444; }
.boat-row.uaua-row { color: #FF9999; }
.b-rk { font-size: 11px; color: #557; min-width: 26px; text-align: right; flex-shrink: 0; }
.boat-row.sel .b-rk { color: #7ecfff; }
.b-nm { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.b-sl { font-size: 11px; color: #557; min-width: 58px; text-align: right; flex-shrink: 0; }
</style>
</head>

<div id="map"></div>

<button id="toggle-panel-btn">&#9776; Bateaux</button>
<div id="boat-panel">
  <div id="panel-header">
    <span id="panel-title">Bateaux</span>
    <button id="clear-sel-btn">&#10005; tout</button>
    <button id="close-panel-btn">&#10005;</button>
  </div>
  <input type="text" id="boat-search" placeholder="Nom ou numéro de voile...">
  <div id="boat-list"></div>
</div>

<div id="controls">
  <div id="row1">
    <button class="step-btn" id="prev-btn">&#8249;</button>
    <button id="play-btn">&#9654;</button>
    <button class="step-btn" id="next-btn">&#8250;</button>
    <input type="range" id="slider" min="0" step="1" value="0">
    <div id="time-display">—</div>
    <div id="elapsed-display">+0.0 h</div>
    <div id="night-badge">&#127769; Nuit</div>
    <div id="legend">
      <div class="legend-item">
        <span class="dot" style="background:#FF4444;border:2px solid #FF0000"></span> UAUA
      </div>
      <div class="legend-item">
        <span class="dot" style="background:#4A9FDD"></span> Surprise
      </div>
      <div class="legend-item">
        <span class="dot" style="background:#FFB800"></span> Sélectionné
      </div>
    </div>
  </div>
  <div id="row2">
    <span class="speed-label">Vitesse :</span>
    <button class="speed-btn active" data-ms="800">1×</button>
    <button class="speed-btn" data-ms="400">2×</button>
    <button class="speed-btn" data-ms="200">4×</button>
    <button class="speed-btn" data-ms="80">10×</button>
  </div>
</div>

function setNightMode(night) {
  if (night === isNight) return;
  isNight = night;
  if (night) { map.removeLayer(dayTiles);  nightTiles.addTo(map); }
  else        { map.removeLayer(nightTiles); dayTiles.addTo(map);  }
  // Highlight trace: darker on light map, brighter on dark map
  if (uauaTrace) uauaTrace.setStyle({ color: night ? '#FF5555' : '#7a0000', opacity: night ? 0.7 : 0.85 });
}

// ── Bearing & heading ─────────────────────────────────────────
function bearing(lat1, lon1, lat2, lon2) {
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
  const y = Math.sin(dLon) * Math.cos(φ2);
  const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(dLon);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

// Direction boat is heading: look ahead up to 3 steps, fall back to looking behind
function computeHeading(bow, step, curLat, curLon) {
  for (let s = step + 1; s <= Math.min(step + 3, ivs.length - 1); s++) {
    const nb = boatAtStep[s][bow];
    if (nb && (Math.abs(nb.la - curLat) > 4e-5 || Math.abs(nb.lo - curLon) > 4e-5))
      return bearing(curLat, curLon, nb.la, nb.lo);
  }
  for (let s = step - 1; s >= Math.max(step - 3, 0); s--) {
    const pb = boatAtStep[s][bow];
    if (pb && (Math.abs(pb.la - curLat) > 4e-5 || Math.abs(pb.lo - curLon) > 4e-5))
      return bearing(pb.la, pb.lo, curLat, curLon);
  }
  return 0;
}

// ── Boat icon SVG ─────────────────────────────────────────────
// viewBox "-10 -12 20 24": origin (0,0) = pixel (10,12) = iconAnchor = boat midship
// Polygon points: bow at top (0,−S), port (−W,+E), stern notch (0,+E−3), starboard (+W,+E)
const HULL = {
  uaua: '0,-11 7,6  0,3  -7,6',    // largest — UAUA
  sel:  '0,-9  5.5,4.5 0,2 -5.5,4.5', // selected boats
  norm: '0,-7  4,3.5 0,1.5 -4,3.5',   // regular racing boats
  fin:  '0,-5  3,2.5 0,1  -3,2.5',    // finished / dimmed
};

const selected = new Set();
const hasSel   = () => selected.size > 0;

function getVisuals(bow, lg) {
  const isUaua = bow === D.hw, isSel = selected.has(bow), dim = hasSel() && !isSel;
  if (isUaua) return { hull: HULL.uaua, fill: '#FF4444', stroke: '#7a0000', sw: 2,   op: dim ? 0.25 : 1 };
  if (isSel)  return { hull: HULL.sel,  fill: '#FFB800', stroke: '#7a4400', sw: 1.8, op: 1 };
  if (lg === 'F') return { hull: HULL.fin, fill: dim ? '#2a2a2a':'#777', stroke: dim ? '#111':'#444', sw: 1, op: dim ? 0.1 : 0.5 };
  return { hull: HULL.norm, fill: '#4A9FDD', stroke: '#1a4a80', sw: 1.5, op: dim ? 0.18 : 0.85 };
}

function boatSvg(hull, fill, stroke, sw) {
  return '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="24" ' +
    'viewBox="-10 -12 20 24" style="overflow:visible;pointer-events:all">' +
    '<polygon points="' + hull + '" fill="' + fill + '" stroke="' + stroke + '" ' +
    'stroke-width="' + sw + '" stroke-linejoin="round"/></svg>';
}

// Create boat markers (L.marker + DivIcon — DOM-based, required for CSS rotation)
const markers = {};
allBows.forEach(bow => {
  const v = getVisuals(bow, 'O');
  const icon = L.divIcon({
    html: boatSvg(v.hull, v.fill, v.stroke, v.sw),
    className: 'boat-icon',
    iconSize: [20, 24],
    iconAnchor: [10, 11],
    tooltipAnchor: [0, -13],
  });
  const m = L.marker([D.fin[0], D.fin[1]], {
    icon, opacity: 0,
    zIndexOffset: bow === D.hw ? 1000 : 0,  // UAUA always on top
  }).addTo(map);
  m.bindTooltip('', { direction: 'top', offset: [0, -5] });
  markers[bow] = m;
});

// ── Trail style ───────────────────────────────────────────────
function trailStyle(bow) {
  const isUaua = bow === D.hw, isSel = selected.has(bow), dim = hasSel() && !isSel;
  if (isUaua) return { color: '#CC2222', weight: 2.5, opacity: dim ? 0.08 : 0.6 };
  if (isSel)  return { color: '#FFB800', weight: 2,   opacity: 0.65 };
  return       { color: '#4A9FDD',       weight: 1.5, opacity: dim ? 0.06 : 0.38 };
}

// ── Render ────────────────────────────────────────────────────
let lastRenderedStep = -1;

// Heavy work runs only on step change: icon shape/color, tooltip, panel rank
function applyStepStyles(step) {
  if (step === lastRenderedStep) return;
  lastRenderedStep = step;
  const iv = ivs[step];

  allBows.forEach(bow => markers[bow].setOpacity(0));

  iv.bts.forEach(b => {
    const m = markers[b.b], el = m.getElement();
    if (!el) return;
    const v    = getVisuals(b.b, b.lg);
    const poly = el.querySelector('polygon');
    if (poly) {
      poly.setAttribute('points',       v.hull);
      poly.setAttribute('fill',         v.fill);
      poly.setAttribute('stroke',       v.stroke);
      poly.setAttribute('stroke-width', v.sw);
    }
    m.setOpacity(v.op);
    const meta = bm[b.b] || {}, name = meta.n || b.b, sail = meta.s || '';
    m.setTooltipContent(
      (b.b === D.hw ? '<b>' : '') + name + (b.b === D.hw ? '</b>' : '') +
      ' <span style="color:#7aa">' + sail + '</span>' +
      '<br>Rang&nbsp;<b>' + b.rk + '</b>&nbsp;&bull;&nbsp;' + LEG[b.lg] +
      (b.lg !== 'F' ? '<br>' + b.km + '&nbsp;km restants' : '')
    );
    const rkEl = document.getElementById('rk-' + b.b);
    if (rkEl) rkEl.textContent = '#' + b.rk;
  });
}

// Per-frame: position, heading rotation, trail (60fps during playback)
function renderFrame(step, frac) {
  applyStepStyles(step);

  const iv0  = ivs[step];
  const bsi1 = step + 1 < ivs.length ? boatAtStep[step + 1] : null;
  const eh   = iv0.eh + (bsi1 ? frac * (ivs[step + 1].eh - iv0.eh) : 0);

  const night = eh >= 11.5 && eh <= 19.5;
  setNightMode(night);

  document.getElementById('time-display').textContent    = iv0.ts;
  document.getElementById('elapsed-display').textContent = '+' + eh.toFixed(1) + ' h';
  document.getElementById('night-badge').style.display   = night ? 'inline-block' : 'none';
  document.getElementById('slider').value = step;

  allBows.forEach(bow => { if (!boatAtStep[step][bow]) trails[bow].setLatLngs([]); });

  iv0.bts.forEach(b => {
    const bow = b.b;
    let lat = b.la, lon = b.lo;
    if (frac > 0 && bsi1) {
      const nb = bsi1[bow];
      if (nb) { lat = b.la + frac * (nb.la - b.la); lon = b.lo + frac * (nb.lo - b.lo); }
    }
    markers[bow].setLatLng([lat, lon]);

    // Rotate boat to face its direction of travel
    if (b.lg !== 'F') {
      const hdg = computeHeading(bow, step, lat, lon);
      const el  = markers[bow].getElement();
      if (el) {
        const svg = el.querySelector('svg');
        if (svg) svg.style.transform = 'rotate(' + hdg.toFixed(1) + 'deg)';
      }
    }

    // Trail
    const pts = [];
    for (let i = Math.max(0, step - TRAIL_LEN); i <= step; i++) {
      const pb = boatAtStep[i][bow]; if (pb) pts.push([pb.la, pb.lo]);
    }
    if (frac > 0 && (lat !== b.la || lon !== b.lo)) pts.push([lat, lon]);
    trails[bow].setLatLngs(pts);
    trails[bow].setStyle(trailStyle(bow));
  });
}

// ── rAF animation ────────────────────────────────────────────
let currentStep = 0, tweenFrac = 0;
let playing = false, lastRAFTime = null, playMs = 800;

function rafLoop(ts) {
  if (!playing) return;
  if (lastRAFTime !== null) {
    tweenFrac += (ts - lastRAFTime) / playMs;
    while (tweenFrac >= 1.0) {
      tweenFrac -= 1.0;
      currentStep++;
      if (currentStep >= ivs.length - 1) {
        currentStep = ivs.length - 1; tweenFrac = 0;
        renderFrame(currentStep, 0); stopPlay(); return;
      }
    }
  }
  lastRAFTime = ts;
  renderFrame(currentStep, tweenFrac);
  requestAnimationFrame(rafLoop);
}

function startPlay() {
  if (currentStep >= ivs.length - 1) { currentStep = 0; tweenFrac = 0; }
  playing = true; lastRAFTime = null;
  document.getElementById('play-btn').innerHTML = '&#9646;&#9646;';
  requestAnimationFrame(rafLoop);
}
function stopPlay() {
  playing = false; tweenFrac = 0;
  document.getElementById('play-btn').innerHTML = '&#9654;';
  renderFrame(currentStep, 0);
}

// ── Boat panel ───────────────────────────────────────────────
const panel     = document.getElementById('boat-panel');
const boatList  = document.getElementById('boat-list');
const searchInp = document.getElementById('boat-search');

sortedBows.forEach(bow => {
  const meta = bm[bow] || {}, name = meta.n || bow, sail = meta.s || '';
  const row  = document.createElement('div');
  row.className      = 'boat-row' + (bow === D.hw ? ' uaua-row' : '');
  row.dataset.bow    = bow;
  row.dataset.query  = (name + ' ' + sail).toLowerCase();
  row.innerHTML =
    '<span class="b-rk" id="rk-' + bow + '">#' + (finalRank[bow] || '?') + '</span>' +
    '<span class="b-nm" title="' + name + '">' + name + '</span>' +
    '<span class="b-sl">' + sail + '</span>';
  row.addEventListener('click', () => {
    if (selected.has(bow)) { selected.delete(bow); row.classList.remove('sel'); }
    else                   { selected.add(bow);    row.classList.add('sel');    }
    updatePanelTitle(); lastRenderedStep = -1; renderFrame(currentStep, tweenFrac);
  });
  boatList.appendChild(row);
});

function updatePanelTitle() {
  const n = selected.size;
  document.getElementById('panel-title').textContent =
    n > 0 ? n + ' sélectionné' + (n > 1 ? 's' : '') : 'Bateaux (' + allBows.size + ')';
}

document.getElementById('clear-sel-btn').addEventListener('click', () => {
  selected.clear();
  document.querySelectorAll('.boat-row.sel').forEach(r => r.classList.remove('sel'));
  updatePanelTitle(); lastRenderedStep = -1; renderFrame(currentStep, tweenFrac);
});
searchInp.addEventListener('input', () => {
  const q = searchInp.value.toLowerCase().trim();
  document.querySelectorAll('.boat-row').forEach(r => {
    r.style.display = (!q || r.dataset.query.includes(q)) ? '' : 'none';
  });
});
document.getElementById('toggle-panel-btn').addEventListener('click', () => panel.classList.add('open'));
document.getElementById('close-panel-btn').addEventListener('click', () => panel.classList.remove('open'));

// ── Controls ─────────────────────────────────────────────────
const slider  = document.getElementById('slider');
const playBtn = document.getElementById('play-btn');
slider.max = ivs.length - 1;

renderFrame(0, 0);

slider.addEventListener('input', () => {
  currentStep = parseInt(slider.value); tweenFrac = 0; renderFrame(currentStep, 0);
});
document.getElementById('prev-btn').addEventListener('click', () => {
  if (currentStep > 0) { currentStep--; tweenFrac = 0; renderFrame(currentStep, 0); }
});
document.getElementById('next-btn').addEventListener('click', () => {
  if (currentStep < ivs.length - 1) { currentStep++; tweenFrac = 0; renderFrame(currentStep, 0); }
});
playBtn.addEventListener('click', () => { playing ? stopPlay() : startPlay(); });

document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    playMs = parseInt(btn.dataset.ms);
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (playing) { stopPlay(); startPlay(); }
  });
});

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === ' ') { e.preventDefault(); playing ? stopPlay() : startPlay(); }
  if (e.key === 'ArrowRight') { if (!playing && currentStep < ivs.length - 1) { currentStep++; renderFrame(currentStep, 0); } }
  if (e.key === 'ArrowLeft')  { if (!playing && currentStep > 0) { currentStep--; renderFrame(currentStep, 0); } }
});
</script>
</body>
</html>
