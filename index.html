<html lang="en-US">
    <head>
        <title>Benoît Baliguet</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="author" content="Benoît Baliguet">
        <meta name="description" content="Lightweigth CV of Benoît Baliguet hosted on GitHub pages.">
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
        <link rel="manifest" href="/site.webmanifest">
        <style>

            :root {
                --hsl-color-rotate: 180;
            }

            body {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                font-weight: 100;
                font-family: sans-serif;
                transition: background-color 5s;
                margin: 0;
                perspective-origin: center;
                transform-style: preserve-3d;
                perspective: 400px;
                color: #666;
                background-color: hsl(var(--hsl-color-rotate), 100%, 92%);
                height: 100%;
            }

            h1 {
                margin: 0 0 10px 0;
                font-weight: 100;
            }
            h2 {
                margin: 0;
                font-weight: 200;
            }
            a, a:active, a:visited {
                color: #222;
            }
            #orbit-canvas {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                z-index: 0;
            }

            #container {
                padding: 20px;
                text-align: center;
                border: solid 3px #666;
                transition: transform 0.1s, background-color 5s;
                background-color: hsl(var(--hsl-color-rotate), 100%, 92%);
                position: relative;
                z-index: 2;
            }

            @media (prefers-color-scheme: dark) {
                body {
                    color: #ddd;
                    background-color: hsl(var(--hsl-color-rotate), 100%, 15%);
                }

                a, a:active, a:visited {
                    color: #fff;
                }

                #container {
                    border-color: #ddd;
                    background-color: hsl(var(--hsl-color-rotate), 100%, 15%);
                }
            }

        </style>
    </head>
    <body>
        <canvas id="orbit-canvas"></canvas>
        <div id='container'>
            <h1>Benoît Baliguet</h1>
            <h2>Software Architect</h2>
            <p>You can find me on <a href="https://github.com/bbaliguet" title="GitHub">GitHub</a> and <a href="https://www.linkedin.com/in/benoitbaliguet/" title="LinkedIn">LinkedIn</a>.</p>
        </div>
    </body>
    <script>

        const isSafari = !!navigator.userAgent. match(/Version\/[\d\. ]+.*Safari/);
        const iOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

        const motionAdapter = isSafari && iOS ? ({ rotationRate: {
            alpha, beta, gamma
        }, interval }) => {
            return {
                interval: interval * 1000,
                rotationRate: {
                    alpha, beta, gamma
                }
            }
        } : a => a;

        // mouse handling

        document.body.addEventListener('mousemove', ({ clientX, clientY }) => {
            const { width, height } = document.body.getBoundingClientRect();
            const rotateY = (clientX - width / 2) / width * 10;
            const rotateX = (height / 2 - clientY ) / height * 10;
            document.getElementById('container').style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        // device rotation

        let rotateX = 0;
        let rotateY = 0;

        let resetTimer = 0;
        let savedX = 0;
        let savedY = 0;
        let setReset = (rotX, rotY) => {
            if (rotX != savedX || rotY != savedY) {
                clearTimeout(resetTimer);
                // reset every 3s
                resetTimer = setTimeout(() => {
                    rotateX = 0;
                    rotateY = 0;
                }, 3000);
            }
            savedX = rotX;
            savedY = rotY;
        }

        window.addEventListener('devicemotion', e => {
            const { rotationRate, interval } = motionAdapter(e);
            rotateX += rotationRate.alpha * interval / 1000;
            rotateY += - rotationRate.beta * interval / 1000;
            document.getElementById('container').style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            setReset(Math.floor(rotateX), Math.floor(rotateY));
        }, true);

        // bg color

        setBgColor = () => {
            const root = document.documentElement;
            const rotate = Math.floor(Math.random() * 360);
            root.style.setProperty('--hsl-color-rotate', rotate);
        }

        setInterval(setBgColor, 10000);
    </script>
    <script>
    (function () {
        const canvas = document.getElementById('orbit-canvas');
        const gl = canvas.getContext('webgl', { alpha: true, premultipliedAlpha: false })
                || canvas.getContext('experimental-webgl', { alpha: true, premultipliedAlpha: false });
        if (!gl) return;

        const VS = `
            attribute vec2 aPos;
            attribute float aSize;
            attribute float aAlpha;
            varying float vAlpha;
            void main() {
                gl_Position = vec4(aPos, 0.0, 1.0);
                gl_PointSize = aSize;
                vAlpha = aAlpha;
            }
        `;

        const FS = `
            precision mediump float;
            varying float vAlpha;
            void main() {
                vec2 c = gl_PointCoord - 0.5;
                float d = length(c);
                if (d > 0.5) discard;
                // soft halo: wide exponential glow
                float halo = exp(-d * 8.0) * 0.55;
                // sharp core
                float core = (1.0 - smoothstep(0.0, 0.18, d)) * 0.9;
                float a = (halo + core) * vAlpha;
                gl_FragColor = vec4(1.0, 1.0, 1.0, a);
            }
        `;

        function mkShader(type, src) {
            const s = gl.createShader(type);
            gl.shaderSource(s, src);
            gl.compileShader(s);
            return s;
        }

        const prog = gl.createProgram();
        gl.attachShader(prog, mkShader(gl.VERTEX_SHADER, VS));
        gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FS));
        gl.linkProgram(prog);
        gl.useProgram(prog);

        const locPos   = gl.getAttribLocation(prog, 'aPos');
        const locSize  = gl.getAttribLocation(prog, 'aSize');
        const locAlpha = gl.getAttribLocation(prog, 'aAlpha');

        const N = 180;
        const orbitR = new Float32Array(N);
        const orbitV = new Float32Array(N);
        const phi0   = new Float32Array(N);
        const incC   = new Float32Array(N);
        const incS   = new Float32Array(N);
        const nodeC  = new Float32Array(N);
        const nodeS  = new Float32Array(N);
        const pSize  = new Float32Array(N);
        const pAlpha = new Float32Array(N);

        for (let i = 0; i < N; i++) {
            orbitR[i] = 0.14 + Math.pow(Math.random(), 0.6) * 0.40;
            orbitV[i] = 0.10 + Math.random() * 0.35;
            phi0[i]   = Math.random() * Math.PI * 2;
            const inc = Math.random() * Math.PI;
            incC[i]   = Math.cos(inc);
            incS[i]   = Math.sin(inc);
            const nd  = Math.random() * Math.PI * 2;
            nodeC[i]  = Math.cos(nd);
            nodeS[i]  = Math.sin(nd);
            pSize[i]  = 1.5 + Math.random() * 3.5;
            pAlpha[i] = 0.35 + Math.random() * 0.55;
        }

        const buf = new Float32Array(N * 4); // x, y, size, alpha per particle
        const vbo = gl.createBuffer();

        let aspect = 1;
        let dpr    = devicePixelRatio || 1;

        function resize() {
            dpr           = devicePixelRatio || 1;
            canvas.width  = innerWidth  * dpr;
            canvas.height = innerHeight * dpr;
            aspect        = canvas.width / canvas.height;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }
        addEventListener('resize', resize);
        resize();

        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

        const PERSP = 0.6;

        function frame(t) {
            requestAnimationFrame(frame);
            const ts = t * 0.001;

            gl.clearColor(0, 0, 0, 0);
            gl.clear(gl.COLOR_BUFFER_BIT);

            for (let i = 0; i < N; i++) {
                const ph = phi0[i] + orbitV[i] * ts;
                const r  = orbitR[i];
                const lx = r * Math.cos(ph);
                const ly = r * Math.sin(ph);

                // Apply orbital inclination (rotation around local X-axis)
                const x1 =  lx;
                const y1 =  ly * incC[i];
                const z1 =  ly * incS[i];

                // Apply ascending node (rotation around Z-axis)
                const x2 =  x1 * nodeC[i] - y1 * nodeS[i];
                const y2 =  x1 * nodeS[i] + y1 * nodeC[i];
                const z2 =  z1;

                // Simple perspective depth
                const depth = PERSP / (PERSP + z2);

                buf[i * 4]     = x2 * depth / aspect;
                buf[i * 4 + 1] = y2 * depth;
                buf[i * 4 + 2] = pSize[i] * depth * dpr;
                buf[i * 4 + 3] = pAlpha[i] * (0.15 + 0.85 * depth);
            }

            gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
            gl.bufferData(gl.ARRAY_BUFFER, buf, gl.DYNAMIC_DRAW);

            const stride = 16; // 4 floats × 4 bytes
            gl.vertexAttribPointer(locPos,   2, gl.FLOAT, false, stride,  0);
            gl.enableVertexAttribArray(locPos);
            gl.vertexAttribPointer(locSize,  1, gl.FLOAT, false, stride,  8);
            gl.enableVertexAttribArray(locSize);
            gl.vertexAttribPointer(locAlpha, 1, gl.FLOAT, false, stride, 12);
            gl.enableVertexAttribArray(locAlpha);

            gl.drawArrays(gl.POINTS, 0, N);
        }

        requestAnimationFrame(frame);
    })();
    </script>
</html>
